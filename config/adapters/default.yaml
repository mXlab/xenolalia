# Adapter configuration: default (manual-only)
# Used with: python xeno_server.py -A config/adapters/default.yaml
#
# Minimal setup with no automated triggers. Use this at installations where
# there is no external control system, or as a starting point for a
# new adapter configuration.

adapter: "Default (manual control only)"

receive_port: 8001

# Named targets (apparatus, macroscope, sonoscope, etc.) are defined in
# xenopc.yaml, not here. Adapter-local targets can be added below if needed:
# targets:
#   custom:
#     host: 127.0.0.1
#     port: 9000

handlers:

  # Manual start — operator-triggered, immediate and unconditional.
  /start:
    type: start
    require_inactive: false

  # Manual stop.
  /stop:
    type: stop

  # Volume — only active if pd target is configured above.
  # /volume:
  #   type: volume
  #   params:
  #     pd_volume_address: /volume

# Timed events. Each item fires once per day at the given HH:MM.
# Each item supports the same osc: and shell: lists as handlers.
# schedule:
#   - time: "22:30"
#     osc:
#       - target: apparatus
#         address: /xeno/ring/grow
#         type: i
#         value: 1
#   - time: "04:50"
#     shell:
#       - command: "sudo reboot"

# OSC-triggered restart / reboot.
# handlers:
#   /restart/pd:
#     type: shell
#     command: "/home/xeno/xenolalia/bin/launch_sonoscope.sh"
#   /restart/projection:
#     type: shell
#     command: "/home/xeno/xenolalia/bin/launch_macroscope.sh"
#   /reboot:
#     type: shell
#     delay_seconds: 5     # brief pause so OSC reply can be sent first
#     command: "sudo reboot"
