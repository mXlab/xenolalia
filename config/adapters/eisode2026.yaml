# Adapter configuration: Eisode 2026 — Montreal
#
# The gallery sends these OSC messages to the adapter:
#   /standby i <minutes>   — reservation starts in N minutes; reset volume
#   /porte   i 1           — door opened; start experiment if visitors on time
#   /start   i 1           — manual start override (operator)
#   /stop    i 1           — manual stop (operator)
#   /volume  f <0.0–1.0>   — manual volume adjustment

adapter: "Eisode 2026 — Montreal"

# Port for incoming gallery OSC. Separate from xeno_server.py (7000) so
# only this port needs to be exposed via port-forwarding.
receive_port: 9632

# No adapter-local targets needed: all targets (apparatus, sonoscope, …)
# are defined in xenopc.yaml.

handlers:

  # Sent ahead of a reservation: N minutes before visitors arrive.
  # Resets volume to 100% and records the reservation start time.
  /standby:
    type: standby
    osc:
      - target: sonoscope
        address: /volume
        type: f
        value: 1.0

  # Door opens: start only if visitors are on time (within first 30 min of slot).
  # Wait 10 min after arrival before starting, to let people settle in.
  # First door-open arms the timer; subsequent ones are ignored (allow_retrigger: false).
  # Only one experiment per session (session resets on /standby).
  /porte:
    type: start
    require_on_time: true
    late_threshold_minutes: 30
    delay_minutes: 10
    allow_retrigger: false
    max_per_session: 1

  # Manual start override — immediate, unconditional.
  /start:
    type: start
    require_inactive: false

  # Manual stop — cancels any pending delayed start.
  /stop:
    type: stop

  # Volume adjustment forwarded to sonoscope (Pd patch).
  /volume:
    type: route
    osc:
      - target: sonoscope
        address: /volume
        type: f
        value: "{0}"

# Daily schedule: grow light on for euglenas overnight, off before opening.
schedule:
  - time: "22:00"
    target: apparatus
    address: /xeno/ring/grow
    type: i
    value: 1
  - time: "09:00"
    target: apparatus
    address: /xeno/ring/dark
    type: i
    value: 1
