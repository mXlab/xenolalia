# Venue configuration: Eisode 2026 — Montreal
#
# The gallery sends these OSC messages to the bridge:
#   /standby i <minutes>   — reservation starts in N minutes; reset volume
#   /porte   i 1           — door opened; start experiment if visitors on time
#   /start   i 1           — manual start override
#   /volume  f <0.0–1.0>   — manual volume adjustment

venue: "Eisode 2026 — Montreal"

# Port for incoming gallery OSC. Keep separate from xeno_server.py's internal
# port (7000) so only this port needs to be exposed via port-forwarding.
receive_port: 9632

# -------------------------------------------------------------------------
# Additional OSC targets (xenopi is handled by xeno_server.py itself)
# -------------------------------------------------------------------------
targets:
  pd:
    host: 127.0.0.1
    port: 7002        # Update to match the [netreceive] port in the Pd patch

# -------------------------------------------------------------------------
# Message handlers
# -------------------------------------------------------------------------
handlers:

  # Sent ahead of a reservation: N minutes before visitors arrive.
  # Resets volume to 100% and records the reservation start time.
  /standby:
    type: standby
    params:
      reset_volume: 1.0
      pd_volume_address: /volume

  # Door opens: start only if visitors are on time (within first 30 min of slot).
  # Wait 10 min after arrival before starting, to let people settle in.
  /porte:
    type: start
    params:
      require_on_time: true
      late_threshold_minutes: 30
      delay_minutes: 10

  # Manual start override — immediate, unconditional.
  /start:
    type: start

  # Manual volume adjustment forwarded directly to Pd.
  /volume:
    type: volume
    params:
      pd_volume_address: /volume
